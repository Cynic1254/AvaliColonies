name: Production Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  compile-production:
    strategy:
      matrix:
        include:
          - path: "CustomMods/AvaliTheme"
            artifact: "avalitheme-release"
          - path: "CustomMods/AvaliConnector"
            artifact: "avaliconnector-release"
    uses: ./.github/workflows/compile.yml
    with:
      project_path: ${{ matrix.path }}
      artifact_name: ${{ matrix.artifact }}
      release_tag: ${{ github.ref_name }}

  publish-release:
    needs: compile-production
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Theme Stable Jar
        uses: actions/download-artifact@v4
        with:
          name: avalitheme-release
          path: release-artifacts/theme

      - name: Download Connector Stable Jar
        uses: actions/download-artifact@v4
        with:
          name: avaliconnector-release
          path: release-artifacts/connector

      - name: Organize Artifacts
        run: |
          mkdir -p final-release/
          find release-artifacts/ -name "*.jar" -exec cp {} final-release/ \;

      - name: Generate Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: final-release/*.jar