name: Packwiz Deployment Server

on:
  # Allows it to be called by other workflows
  workflow_call:
  # Keeps it working for direct changes to Modpack/
  push:
    branches: [ "main" ]
    paths:
      - 'Modpack/**'
      - '!Modpack/.bin/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  host-distribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify and Re-index Hashes via Local Bin
        run: |
          cd Modpack
          chmod +x .bin/packwiz
          ./.bin/packwiz refresh

      - name: Prepare Pages Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Modpack'

      - name: Push Live to Web Server
        id: deployment
        uses: actions/deploy-pages@v4