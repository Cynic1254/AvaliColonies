name: Shared Compilation Engine

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string
        description: "Relative path to the mod project folder (e.g., CustomMods/AvaliTheme)"
      artifact_name:
        required: true
        type: string
        description: "The name of the stashed zip file artifact"
      release_tag:
        required: false
        type: string
        default: ""

jobs:
  execute-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Inject Release Version
        if: ${{ inputs.release_tag != '' }}
        run: |
          chmod +x .github/scripts/update-version.sh
          .github/scripts/update-version.sh "${{ inputs.release_tag }}"

      - name: Build Mod Project
        run: |
          chmod +x gradlew
          ./gradlew build
        working-directory: ${{ inputs.project_path }}

      - name: Stash Built Elements
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.project_path }}/build/libs/*.jar