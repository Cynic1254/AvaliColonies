name: Core Dev Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'CustomMods/AvaliTheme/**'
      - 'CustomMods/AvaliConnector/**'
      - 'CustomMods/gradle.properties'

jobs:
  evaluate-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      run_build: ${{ steps.set-matrix.outputs.run_build }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      # Generates a clean matrix configuration array based on the modified files
      - id: set-matrix
        run: |
          THEME=$(git diff --name-only HEAD^ HEAD | grep -q '^CustomMods/AvaliTheme/' && echo 'true' || echo 'false')
          CONNECTOR=$(git diff --name-only HEAD^ HEAD | grep -q '^CustomMods/AvaliConnector/' && echo 'true' || echo 'false')
          
          if git diff --name-only HEAD^ HEAD | grep -q '^CustomMods/gradle.properties'; then
            THEME="true"
            CONNECTOR="true"
          fi

          # Construct JSON inclusion blocks dynamically
          MATRIX_JSON="{\"include\":["
          ADDED=false
          
          if [ "$THEME" = "true" ]; then
            MATRIX_JSON="${MATRIX_JSON}{\"id\":\"avalitheme\",\"path\":\"CustomMods/AvaliTheme\",\"artifact\":\"avalitheme-latest\"}"
            ADDED=true
          fi
          if [ "$CONNECTOR" = "true" ]; then
            if [ "$ADDED" = true ]; then MATRIX_JSON="${MATRIX_JSON},"; fi
            MATRIX_JSON="${MATRIX_JSON}{\"id\":\"avaliconnector\",\"path\":\"CustomMods/AvaliConnector\",\"artifact\":\"avaliconnector-latest\"}"
            ADDED=true
          fi
          
          MATRIX_JSON="${MATRIX_JSON}]}"
          
          echo "matrix=${MATRIX_JSON}" >> $GITHUB_OUTPUT
          echo "run_build=${ADDED}" >> $GITHUB_OUTPUT

  # This job executes the paths in parallel if changes are present
  run-compiler:
    needs: evaluate-changes
    if: ${{ needs.evaluate-changes.outputs.run_build == 'true' }}
    strategy:
      matrix: ${{ fromJson(needs.evaluate-changes.outputs.matrix) }}
    uses: ./.github/workflows/compile.yml
    with:
      project_path: ${{ matrix.path }}
      artifact_name: ${{ matrix.artifact }}

  update-dev-packwiz:
    needs: [evaluate-changes, run-compiler]
    if: ${{ always() && !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      # Download the theme artifact if it was built
      - name: Download Theme Jar
        if: ${{ contains(needs.evaluate-changes.outputs.matrix, 'avalitheme-latest') }}
        uses: actions/download-artifact@v4
        with:
          name: avalitheme-latest
          path: build-outputs/theme

      # Download the connector artifact if it was built
      - name: Download Connector Jar
        if: ${{ contains(needs.evaluate-changes.outputs.matrix, 'avaliconnector-latest') }}
        uses: actions/download-artifact@v4
        with:
          name: avaliconnector-latest
          path: build-outputs/connector

      - name: Stage Jars into LFS Folder
        run: |
          chmod +x .github/scripts/update-packwiz-nightly.sh
          
          if [ -d "build-outputs/theme" ]; then
            ./.github/scripts/update-packwiz-nightly.sh "avalitheme" "build-outputs/theme"
          fi
          if [ -d "build-outputs/connector" ]; then
            ./.github/scripts/update-packwiz-nightly.sh "avaliconnector" "build-outputs/connector"
          fi

      - name: Refresh and Commit Meta & LFS Changes
        run: |
          cd Modpack
          chmod +x .bin/packwiz
          ./.bin/packwiz refresh
          
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add mods/*.pw.toml index.toml pack.toml jars/*.jar
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update nightly packwiz hashes and LFS binaries"
          git push origin main

  trigger-deployment:
    needs: [update-dev-packwiz]
    uses: ./.github/workflows/packwiz-deploy.yml