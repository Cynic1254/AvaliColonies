name: Core Dev Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'CustomMods/AvaliTheme/**'
      - 'CustomMods/AvaliConnector/**'
      - 'CustomMods/gradle.properties'

jobs:
  evaluate-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      run_build: ${{ steps.set-matrix.outputs.run_build }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - id: set-matrix
        run: |
          THEME=$(git diff --name-only HEAD^ HEAD | grep -q '^CustomMods/AvaliTheme/' && echo 'true' || echo 'false')
          CONNECTOR=$(git diff --name-only HEAD^ HEAD | grep -q '^CustomMods/AvaliConnector/' && echo 'true' || echo 'false')
          
          if git diff --name-only HEAD^ HEAD | grep -q '^CustomMods/gradle.properties'; then
            THEME="true"
            CONNECTOR="true"
          fi

          MATRIX_JSON="{\"include\":["
          ADDED=false
          
          if [ "$THEME" = "true" ]; then
            MATRIX_JSON="${MATRIX_JSON}{\"id\":\"avalitheme\",\"path\":\"CustomMods/AvaliTheme\",\"artifact\":\"avalitheme-latest\"}"
            ADDED=true
          fi
          if [ "$CONNECTOR" = "true" ]; then
            if [ "$ADDED" = true ]; then MATRIX_JSON="${MATRIX_JSON},"; fi
            MATRIX_JSON="${MATRIX_JSON}{\"id\":\"avaliconnector\",\"path\":\"CustomMods/AvaliConnector\",\"artifact\":\"avaliconnector-latest\"}"
            ADDED=true
          fi
          
          MATRIX_JSON="${MATRIX_JSON}]}"
          echo "matrix=${MATRIX_JSON}" >> $GITHUB_OUTPUT
          echo "run_build=${ADDED}" >> $GITHUB_OUTPUT

  run-compiler:
    needs: evaluate-changes
    if: ${{ needs.evaluate-changes.outputs.run_build == 'true' }}
    strategy:
      matrix: ${{ fromJson(needs.evaluate-changes.outputs.matrix) }}
    uses: ./.github/workflows/compile.yml
    with:
      project_path: ${{ matrix.path }}
      artifact_name: ${{ matrix.artifact }}

  update-and-deploy:
    needs: [evaluate-changes, run-compiler]
    if: ${{ always() && !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download Theme Jar
        if: ${{ contains(needs.evaluate-changes.outputs.matrix, 'avalitheme-latest') }}
        uses: actions/download-artifact@v4
        with:
          name: avalitheme-latest
          path: build-outputs/theme

      - name: Download Connector Jar
        if: ${{ contains(needs.evaluate-changes.outputs.matrix, 'avaliconnector-latest') }}
        uses: actions/download-artifact@v4
        with:
          name: avaliconnector-latest
          path: build-outputs/connector

      # 1, 2, 3: Generate the files locally
      - name: Generate Meta & Stage Binaries
        run: |
          chmod +x .github/scripts/generate-toml.sh
          
          if [ -d "build-outputs/theme" ]; then
            ./.github/scripts/generate-toml.sh "avalitheme" "Avali Theme" "build-outputs/theme"
          fi
          if [ -d "build-outputs/connector" ]; then
            ./.github/scripts/generate-toml.sh "avaliconnector" "Avali Colonies Connector" "build-outputs/connector"
          fi

      # 4: Refresh packwiz index locally
      - name: Refresh Packwiz Index
        run: |
          cd Modpack
          chmod +x .bin/packwiz
          ./.bin/packwiz refresh

      # 5: Create the Pages deployment bundle straight from the current workspace
      - name: Prepare Pages Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Modpack'

      # 6: Push live to the web server immediately
      - name: Push Live to Web Server
        id: deployment
        uses: actions/deploy-pages@v4

      # 7: Commit and push tracking metadata back to the repository histories safely
      - name: Commit and Push Tracked Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add Modpack/mods/*.toml Modpack/.bin/*.jar Modpack/index.toml Modpack/pack.toml
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: automated packwiz refresh and binary staging"
          git push origin main