modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies."${mod_id}"]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Explicitly require the standalone plugin to be loaded first
[[dependencies."${mod_id}"]]
modId = "avalitheme"
mandatory = true
versionRange = "[${avalitheme_version}]"
ordering = "AFTER"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecolonies"
mandatory = true
versionRange = "[1.20.1-1.1.1231,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "ad_astra"
mandatory = true
versionRange = "[1.15.20,)"
ordering = "AFTER"
side = "BOTH"